<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olinda Transforma - Portal de Minijogos</title>
    <style>
        /* Cores de Pernambuco e Olinda */
        :root {
            --azul-pe: #0056b3;
            --amarelo-pe: #ffcc00;
            --vermelho-pe: #cc0000;
            --verde-olinda: #008751;
            --branco: #ffffff;
            --background: #f4f4f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background);
            color: #333;
        }

        /* Header Estilo Carnaval/Pernambuco */
        header {
            background: linear-gradient(135deg, var(--azul-pe) 30%, var(--verde-olinda) 90%);
            color: var(--branco);
            padding: 20px;
            text-align: center;
            border-bottom: 8px solid var(--amarelo-pe);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 2px 2px var(--vermelho-pe);
        }

        header p {
            margin: 5px 0 0 0;
            font-style: italic;
            color: var(--amarelo-pe);
            font-weight: bold;
        }

        /* Layout estilo Poki (Grid de Jogos) */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .grid-jogos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card-jogo {
            background-color: var(--branco);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .card-jogo:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border-color: var(--amarelo-pe);
        }

        .thumb-jogo {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
        }

        .bg-rua { background: linear-gradient(45deg, #555, #777); }
        .bg-rampa { background: linear-gradient(45deg, var(--verde-olinda), #2ecc71); }
